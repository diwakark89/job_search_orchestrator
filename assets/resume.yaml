# ============================================================
# resume.yaml — JobSearchAgent personal profile
# ============================================================
# Copy this file to resume.yaml and fill in your real details.
# resume.yaml is gitignored — your personal data stays local.
#
# This file serves two purposes:
#   1. Scoring: summary + skills + experience are sent to the AI
#      to score job matches against your profile.
#   2. Auto-fill (Phase 2): personal + autofill sections will be
#      used by the browser automation layer to fill application forms.
# ============================================================

