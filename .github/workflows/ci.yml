name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

defaults:
  run:
    working-directory: .

jobs:
  test:
    name: Lint, type-check & test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Check formatting (ruff format --check)
        run: uv run ruff format --check src/ tests/
        continue-on-error: true   # Formatting is advisory until ruff is fully configured

      - name: Lint (ruff check)
        run: uv run ruff check src/ tests/
        continue-on-error: true   # Linting is advisory until ruff is fully configured

      - name: Type-check (pyright)
        run: uv run pyright src/
        continue-on-error: true   # Type-check is advisory until stubs are complete

      - name: Run unit tests
        env:
          # Provide dummy env vars so config-loading code does not raise during
          # tests that only unit-test logic without real credentials.
          SUPABASE_URL: "https://test.supabase.co"
          SUPABASE_KEY: "test_key"
          COPILOT_MODEL: "gpt-4o-mini"
        run: uv run python -m pytest -v --tb=short -m "not integration"

  smoke:
    name: Entrypoint smoke tests
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync

      - name: Smoke test — jobspy-search --help
        run: uv run jobspy-search --help

      - name: Smoke test — jobspy-mcp-server --help
        run: uv run jobspy-mcp-server --help
